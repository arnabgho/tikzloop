<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tikzloop · GRPO live</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  .viz-root {
    /* reference palette roles — light */
    --surface-1: #fcfcfb; --surface-2: #f0efec;
    --text-primary: #0b0b0b; --text-secondary: #52514e; --text-muted: #8a887f;
    --grid: #e7e6e1;
    --reward: #2a78d6;          /* blue  — reward curve */
    --reward-band: rgba(42,120,214,0.10);
    --compile: #1baf7a;         /* aqua  — compile rate */
    --allfail: #e34948;         /* red   — all-fail groups */
    --zerovar: #eda100;         /* yellow— zero-variance groups */
    --sim: #2a78d6;             /* blue  — similarity median */
    --sim-band: rgba(42,120,214,0.10);
    --ink: #eb6834;             /* orange— ink fraction (hack tripwire) */
    --diversity: #4a3aa7;       /* violet— distinct completions */
    --kl: #e87ba4;              /* magenta — KL */
    --canary: #008300;          /* green — LoRA-B norm */
    --good: #0ca30c; --critical: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1: #1a1a19; --surface-2: #262624;
      --text-primary: #ffffff; --text-secondary: #c3c2b7; --text-muted: #8a887f;
      --grid: #33332f;
      --reward: #3987e5; --reward-band: rgba(57,135,229,0.14);
      --compile: #199e70; --allfail: #e66767; --zerovar: #c98500;
      --sim: #3987e5; --sim-band: rgba(57,135,229,0.14);
      --ink: #d95926; --diversity: #9085e9; --kl: #d55181; --canary: #008300;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body.viz-root {
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    background: var(--surface-1); color: var(--text-primary);
    font-size: 14px; padding: 26px 30px 60px;
  }
  header { display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; margin-bottom:6px; }
  h1 { font-size:20px; font-weight:700; }
  h1 .mono { font-family:"IBM Plex Mono",monospace; }
  #cfg { color: var(--text-secondary); font-size:12.5px; font-family:"IBM Plex Mono",monospace; }
  #status { margin-left:auto; font-size:12px; color:var(--text-muted); }

  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin:18px 0 22px; }
  .tile { background:var(--surface-2); border-radius:8px; padding:12px 14px; }
  .tile .label { font-size:11.5px; color:var(--text-secondary); margin-bottom:4px; }
  .tile .value { font-size:24px; font-weight:600; }
  .tile .sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .tile.canary .value.ok { color: var(--good); }
  .tile.canary .value.bad { color: var(--critical); }

  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(430px,1fr)); gap:16px; }
  figure.panel { background:var(--surface-2); border-radius:10px; padding:14px 16px 10px; }
  figure.panel h2 { font-size:13.5px; font-weight:600; }
  figure.panel .watch { font-size:11.5px; color:var(--text-muted); margin:2px 0 6px; }
  .legend { display:flex; gap:14px; font-size:11.5px; color:var(--text-secondary); margin-bottom:2px; }
  .legend span::before { content:""; display:inline-block; width:10px; height:10px; border-radius:3px;
    margin-right:5px; vertical-align:-1px; background:var(--sw); }
  svg { display:block; width:100%; }
  .gridline { stroke:var(--grid); stroke-width:1; }
  .axis-text { fill:var(--text-muted); font-size:10px; font-family:"IBM Plex Mono",monospace; }
  .end-label { fill:var(--text-secondary); font-size:10.5px; font-family:"IBM Plex Mono",monospace; }
  .rule { stroke:var(--text-muted); stroke-width:1; stroke-dasharray:none; opacity:.55; }
  .tooltip { position:fixed; pointer-events:none; background:var(--surface-1); color:var(--text-primary);
    border:1px solid var(--grid); border-radius:6px; padding:6px 9px; font-size:11.5px;
    font-family:"IBM Plex Mono",monospace; box-shadow:0 2px 10px rgba(0,0,0,.15); display:none; z-index:5; }
  .crosshair { stroke:var(--text-muted); stroke-width:1; opacity:.4; display:none; }

  #gallery { margin-top:26px; }
  #gallery h2, #tablewrap h2 { font-size:15px; margin-bottom:10px; }
  #gallery .note { font-size:12px; color:var(--text-muted); margin-bottom:10px; }
  .sheets { display:flex; flex-direction:column; gap:10px; }
  .sheets figure { background:var(--surface-2); border-radius:8px; padding:8px; }
  .sheets img { max-width:100%; border-radius:4px; display:block; }
  .sheets figcaption { font-size:11px; color:var(--text-muted); margin-top:4px; font-family:"IBM Plex Mono",monospace; }

  #tablewrap { margin-top:26px; }
  table { width:100%; border-collapse:collapse; font-size:12px; font-variant-numeric:tabular-nums;
    font-family:"IBM Plex Mono",monospace; }
  th { text-align:right; color:var(--text-secondary); font-weight:600; padding:6px 8px;
    border-bottom:1px solid var(--grid); }
  td { text-align:right; padding:5px 8px; border-bottom:1px solid var(--grid); color:var(--text-primary); }
  th:first-child, td:first-child { text-align:left; }
</style>
</head>
<body class="viz-root">

<header>
  <h1>tikzloop · GRPO <span class="mono" id="runname"></span></h1>
  <span id="cfg"></span>
  <span id="status">connecting…</span>
</header>

<div class="tiles" id="tiles"></div>
<div class="grid" id="panels"></div>

<section id="gallery">
  <h2>Rollout samples <span style="font-weight:400;color:var(--text-muted)">(ground truth + one group, newest first)</span></h2>
  <div class="note">The habit this gallery exists to build: judge the run by looking at samples, not only at curves. Reward can rise while figures get worse.</div>
  <div class="sheets" id="sheets"></div>
</section>

<section id="tablewrap">
  <h2>Recent reward calls</h2>
  <div style="overflow-x:auto"><table id="table"></table></div>
</section>

<div class="tooltip" id="tooltip"></div>

<script>
const css = k => getComputedStyle(document.body).getPropertyValue(k).trim();
const fmt = (v,d=3) => v==null ? "–" : (+v).toFixed(d);
const pct = v => v==null ? "–" : (100*v).toFixed(0)+"%";

/* ---------- generic line chart: one x-axis, N series, band, rules, hover ---------- */
function lineChart(host, spec) {
  const W=430, H=170, m={l:40,r:56,t:8,b:20};
  const data = spec.series.filter(s => s.pts.length > 0);
  host.innerHTML = "";
  if (!data.length) { host.innerHTML = "<div style='color:var(--text-muted);font-size:12px;padding:26px 0'>waiting for data…</div>"; return; }
  const xs = data.flatMap(s => s.pts.map(p => p[0]));
  const ys = data.flatMap(s => s.pts.map(p => p[1])).concat(spec.band ? spec.band.flatMap(p=>[p[1],p[2]]) : []);
  const x0=Math.min(...xs), x1=Math.max(...xs,x0+1);
  let y0 = spec.y0 ?? Math.min(0, ...ys), y1 = spec.y1 ?? Math.max(...ys)*1.08;
  if (y1 <= y0) y1 = y0 + 1;
  const X = v => m.l + (v-x0)/(x1-x0)*(W-m.l-m.r);
  const Y = v => H-m.b - (v-y0)/(y1-y0)*(H-m.t-m.b);
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);

  const add=(tag,attrs,parent=svg)=>{const e=document.createElementNS(ns,tag);
    for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);parent.appendChild(e);return e;};

  // recessive grid: 3 horizontal hairlines + labels
  for (let i=0;i<=2;i++){
    const v=y0+(y1-y0)*i/2, y=Y(v);
    add("line",{x1:m.l,x2:W-m.r,y1:y,y2:y,class:"gridline"});
    add("text",{x:m.l-5,y:y+3,"text-anchor":"end",class:"axis-text"}).textContent=
      spec.pctAxis?Math.round(v*100)+"%":(+v.toFixed(Math.abs(y1)<0.1?4:2));
  }
  add("text",{x:W-m.r,y:H-5,"text-anchor":"end",class:"axis-text"}).textContent=spec.xlabel||"iteration";

  if (spec.band) {
    const up=spec.band.map(p=>`${X(p[0])},${Y(p[2])}`), dn=spec.band.slice().reverse().map(p=>`${X(p[0])},${Y(p[1])}`);
    add("polygon",{points:up.concat(dn).join(" "),fill:css(spec.bandColor||"--reward-band")});
  }
  (spec.rules||[]).forEach(r=>{
    if (r.v<y0||r.v>y1) return;
    add("line",{x1:m.l,x2:W-m.r,y1:Y(r.v),y2:Y(r.v),class:"rule"});
    add("text",{x:W-m.r+4,y:Y(r.v)+3,class:"end-label"}).textContent=r.label;
  });

  data.forEach(s=>{
    add("polyline",{points:s.pts.map(p=>`${X(p[0])},${Y(p[1])}`).join(" "),
      fill:"none",stroke:css(s.color),"stroke-width":2,"stroke-linejoin":"round","stroke-linecap":"round"});
    const last=s.pts[s.pts.length-1];
    const dot=add("circle",{cx:X(last[0]),cy:Y(last[1]),r:4,fill:css(s.color),
      stroke:css("--surface-2"),"stroke-width":2});
    add("text",{x:X(last[0])+7,y:Y(last[1])+3.5,class:"end-label"}).textContent=
      spec.pctAxis?pct(last[1]):fmt(last[1],spec.dp??3);
  });

  // crosshair + tooltip
  const ch=add("line",{y1:m.t,y2:H-m.b,class:"crosshair"});
  const tip=document.getElementById("tooltip");
  svg.addEventListener("mousemove",ev=>{
    const r=svg.getBoundingClientRect();
    const px=(ev.clientX-r.left)*(W/r.width);
    const xv=x0+(px-m.l)/(W-m.l-m.r)*(x1-x0);
    let best=null;
    data.forEach(s=>s.pts.forEach(p=>{if(best==null||Math.abs(p[0]-xv)<Math.abs(best-xv))best=p[0];}));
    if(best==null)return;
    ch.setAttribute("x1",X(best)); ch.setAttribute("x2",X(best)); ch.style.display="block";
    tip.style.display="block"; tip.style.left=(ev.clientX+14)+"px"; tip.style.top=(ev.clientY+10)+"px";
    tip.innerHTML=`<b>${spec.xlabel||"iter"} ${Math.round(best)}</b><br>`+data.map(s=>{
      const p=s.pts.reduce((a,b)=>Math.abs(b[0]-best)<Math.abs(a[0]-best)?b:a);
      return `${s.name}: ${spec.pctAxis?pct(p[1]):fmt(p[1],spec.dp??3)}`;}).join("<br>");
  });
  svg.addEventListener("mouseleave",()=>{ch.style.display="none";tip.style.display="none";});
  host.appendChild(svg);
}

/* ---------- panel scaffolding ---------- */
const PANELS = [
  {id:"reward", title:"Reward (mean ± std)", watch:"watch: the 0.1 format floor is harvested first — easy wins in order of ease, not importance.",
   legend:null},
  {id:"compile", title:"Compilation rate", watch:"watch: RL prunes syntax errors fast — this is the paper's 52%→98% story.", legend:null},
  {id:"groups", title:"Degenerate groups", watch:"watch: all-fail and zero-variance groups produce exactly zero gradient — wasted steps. High early is normal; persistent means prompts are too hard.",
   legend:[["all-fail fraction","--allfail"],["zero-variance fraction","--zerovar"]]},
  {id:"sim", title:"Similarity (p25–p75 band, median) vs ink fraction", watch:"watch the tripwire: similarity rising while ink fraction falls = the blank-figure reward hack.",
   legend:[["similarity median","--sim"],["ink fraction","--ink"]]},
  {id:"diversity", title:"Rollout diversity", watch:"watch: distinct-completion ratio falling toward 1/G = entropy collapse; groups stop exploring and advantages vanish.", legend:null},
  {id:"kl", title:"KL to reference", watch:"watch: with β=0 KL is unconstrained — drift is allowed; a sudden spike usually precedes degenerate outputs.", legend:null},
  {id:"clip", title:"Clip activity", watch:"watch: high-side clipping is what Clip-Higher (ε_high=0.28) relaxes — room for low-probability exploration tokens to grow.",
   legend:[["clipped low","--compile"],["clipped high","--ink"]]},
  {id:"timing", title:"Where the step time goes", watch:"watch: generation dominates — this is the memory-bandwidth wall; reward compile time is the cheap part.",
   legend:[["full step (s)","--reward"],["reward phase (s)","--compile"]]},
  {id:"canary", title:"LoRA-B norm (training canary)", watch:"watch: this MUST grow off zero. Flat at 0.0 = the zero-gradient bug — nothing is training, stop the run.", legend:null},
];

const panelsEl=document.getElementById("panels");
PANELS.forEach(p=>{
  const f=document.createElement("figure"); f.className="panel";
  f.innerHTML=`<h2>${p.title}</h2><div class="watch">${p.watch}</div>`+
    (p.legend?`<div class="legend">${p.legend.map(([n,c])=>`<span style="--sw:var(${c})">${n}</span>`).join("")}</div>`:"")+
    `<div class="chart" id="chart-${p.id}"></div>`;
  panelsEl.appendChild(f);
});
const chart=id=>document.getElementById("chart-"+id);

/* ---------- data plumbing ---------- */
const findKey=(obj,frag)=>Object.keys(obj).find(k=>k.includes(frag));
const series=(rows,xk,yk)=>rows.filter(r=>r[yk]!=null).map(r=>[r[xk],r[yk]]);

function tiles(d){
  const m=d.metrics.filter(r=>r.kind==="train"), last=m[m.length-1]||{};
  const s=d.summaries, sl=s[s.length-1]||{};
  const rk=findKey(last,"total_rewards_mean");
  const norm=[...d.metrics].reverse().find(r=>r.lora_b_norm!=null)?.lora_b_norm;
  const canaryOk=norm!=null&&norm>1e-6;
  const el=document.getElementById("tiles");
  el.innerHTML=[
    ["iteration", last.iteration??"–", d.config.iters?`of ${d.config.iters}`:""],
    ["reward mean", fmt(rk?last[rk]:sl.reward_mean), "latest report"],
    ["compile rate", pct(sl.compile_rate), d.baseline.compile_rate!=null?`baseline ${pct(d.baseline.compile_rate)}`:"per reward call"],
    ["all-fail groups", pct(sl.all_fail_group_frac), "zero gradient"],
    ["tokens / s", last.tokens_per_second?(+last.tokens_per_second).toFixed(1):"–", "rollout+train"],
    ["peak memory", last.peak_memory?(+last.peak_memory).toFixed(1)+" GB":"–", ""],
  ].map(([l,v,sub])=>`<div class="tile"><div class="label">${l}</div><div class="value">${v}</div><div class="sub">${sub}</div></div>`).join("")+
  `<div class="tile canary"><div class="label">LoRA-B norm</div><div class="value ${canaryOk?"ok":"bad"}">${norm==null?"–":(+norm).toFixed(3)}</div><div class="sub">${canaryOk?"gradients flowing":"zero = not training"}</div></div>`;
}

function render(d){
  document.getElementById("runname").textContent=d.run;
  document.getElementById("cfg").textContent=d.config.model?`${d.config.model} · G=${d.config.group_size} · T=${d.config.temperature} · lr=${d.config.learning_rate}`:"";
  tiles(d);
  const m=d.metrics.filter(r=>r.kind==="train"), s=d.summaries;
  if(m.length){
    const rmean=findKey(m[m.length-1],"total_rewards_mean"), rstd=findKey(m[m.length-1],"total_rewards_std");
    lineChart(chart("reward"),{series:[{name:"reward",color:"--reward",pts:series(m,"iteration",rmean)}],
      band:rstd?m.filter(r=>r[rmean]!=null).map(r=>[r.iteration,r[rmean]-r[rstd],r[rmean]+r[rstd]]):null,
      rules:[{v:0.1,label:"format floor"},...(d.baseline.reward_mean!=null?[{v:d.baseline.reward_mean,label:"baseline"}]:[])],
      y0:0,y1:1,});
    const kl=findKey(m[m.length-1],"train_kl");
    lineChart(chart("kl"),{series:[{name:"KL",color:"--kl",pts:kl?series(m,"iteration",kl):[]}],dp:4,y0:0});
    const cl=findKey(m[m.length-1],"clip_ratio_low"),chg=findKey(m[m.length-1],"clip_ratio_high");
    lineChart(chart("clip"),{series:[
      {name:"clipped low",color:"--compile",pts:cl?series(m,"iteration",cl):[]},
      {name:"clipped high",color:"--ink",pts:chg?series(m,"iteration",chg):[]}],pctAxis:true,y0:0});
    lineChart(chart("timing"),{series:[
      {name:"full step",color:"--reward",pts:m.filter(r=>r.iterations_per_second>0).map(r=>[r.iteration,1/r.iterations_per_second])},
      {name:"reward phase",color:"--compile",pts:s.map(r=>[r.call,r.reward_phase_s])}],dp:1,y0:0,xlabel:"iteration ≈ call"});
    lineChart(chart("canary"),{series:[{name:"‖B‖",color:"--canary",pts:m.filter(r=>r.lora_b_norm!=null).map(r=>[r.iteration,r.lora_b_norm])}],dp:3,y0:0});
  }
  if(s.length){
    lineChart(chart("compile"),{series:[{name:"compile rate",color:"--compile",pts:series(s,"call","compile_rate")}],
      rules:d.baseline.compile_rate!=null?[{v:d.baseline.compile_rate,label:"baseline"}]:[],pctAxis:true,y0:0,y1:1,xlabel:"reward call"});
    lineChart(chart("groups"),{series:[
      {name:"all-fail",color:"--allfail",pts:series(s,"call","all_fail_group_frac")},
      {name:"zero-variance",color:"--zerovar",pts:series(s,"call","zero_variance_group_frac")}],pctAxis:true,y0:0,y1:1,xlabel:"reward call"});
    lineChart(chart("diversity"),{series:[{name:"distinct ratio",color:"--diversity",pts:series(s,"call","distinct_completion_ratio")}],pctAxis:true,y0:0,y1:1,xlabel:"reward call"});
  }
  if(d.sim_series.length){
    lineChart(chart("sim"),{series:[
      {name:"similarity p50",color:"--sim",pts:d.sim_series.map(r=>[r.call,r.p50])},
      {name:"ink fraction",color:"--ink",pts:d.sim_series.filter(r=>r.ink!=null).map(r=>[r.call,r.ink])}],
      band:d.sim_series.map(r=>[r.call,r.p25,r.p75]),bandColor:"--sim-band",y0:0,y1:1,xlabel:"reward call"});
  }
  document.getElementById("sheets").innerHTML=d.samples.map(f=>
    `<figure><img src="/samples/${f}" alt="rollout sample ${f}"><figcaption>${f}</figcaption></figure>`).join("");
  const rows=s.slice(-15).reverse();
  document.getElementById("table").innerHTML=
    `<tr><th>call</th><th>compile</th><th>reward μ</th><th>all-fail</th><th>group σ</th><th>distinct</th><th>reward s</th></tr>`+
    rows.map(r=>`<tr><td>${r.call}</td><td>${pct(r.compile_rate)}</td><td>${fmt(r.reward_mean)}</td><td>${pct(r.all_fail_group_frac)}</td><td>${fmt(r.within_group_reward_std)}</td><td>${pct(r.distinct_completion_ratio)}</td><td>${fmt(r.reward_phase_s,1)}</td></tr>`).join("");
}

async function tick(){
  try{
    const d=await (await fetch("/data")).json();
    render(d);
    document.getElementById("status").textContent="live · updated "+new Date().toLocaleTimeString();
  }catch(e){ document.getElementById("status").textContent="disconnected — is dashboard.py running?"; }
}
tick(); setInterval(tick,5000);
</script>
</body>
</html>
